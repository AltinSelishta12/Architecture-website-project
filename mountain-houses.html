        <script>
            const nightBtn = document.getElementById("nightBtn");
            //Normal design night/light mode function
            nightBtn.addEventListener("click", function(){
                document.body.classList.toggle("night");
            })
            //Hamburger responsive menu function
            const menuBtn = document.getElementById("menuBtn");
            const menuContent = document.getElementById("menuContent");

            menuBtn.addEventListener("click", function(){
                menuContent.classList.toggle("active");
            })
            // Responsive design night/light mode function
            const nightMode = document.getElementById("nightMode");
            nightMode.addEventListener("click", function(){
                document.body.classList.toggle("night");
            })

            window.addEventListener("scroll", function(){
                 const returnArrow = document.querySelector(".returnArrow");

                 if(window.scrollY > 300){
                    returnArrow.style.display = "block";
                 }
                 else{
                    returnArrow.style.display = "none";
                 }


            })
        </script>
