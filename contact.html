<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchForm: Kontakti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&family=Anta&family=Audiowide&family=Bebas+Neue&family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Dancing+Script:wght@400..700&family=Gidugu&family=Great+Vibes&family=Lobster&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&family=Petit+Formal+Script&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rationale&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Rubik+Vinyl&family=Russo+One&family=Train+One&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0px;
            padding: 0px;
            text-decoration: none;
            list-style: none;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: #f7f7f7;
        }
        h1{
            font-family: "Poppins", serif;
            font-weight: 600;
            color: #000;
            font-size: 2rem;
            margin-bottom: 2%;
        }
        form{
             display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color:#fff;
            width: 40%;
            height: 80vh;
            border-radius: 5px;
            border: 1px solid black;
        }
        form input{
            margin-top: 3%;
            width: 60%;
            height: 8%;
            padding: 2%;
            border-radius: 5px;
            border: 1px solid black;
            font-family: "Poppins", serif;
            font-weight: 600;
            color: #000;
            position: relative;
        }
        form input::placeholder{
             font-family: "Poppins", serif;
            font-weight: 600;
            color: #888888;
        }
        form input:focus{
             font-family: "Poppins", serif;
            font-weight: 600;
            color: #000;
        }
        form textarea{
            margin-top: 5%;
            width: 60%;
            height: 40%;
            font-family: "Poppins", serif;
            font-weight: 600;
            color: #000;
            padding: 1% 3%;
            text-align: center;
        }
        form textarea:focus{
            text-align: left;
        }
        form button{
            margin-top: 5%;
            margin-bottom: 3%;
            width: 60%;
            height: 10%;
             font-family: "Poppins", serif;
            font-weight: 600;
            color: #000;
            background-color: rgb(34, 75, 34);
            border: none;
            color: #fff;
        }
        form button:hover{
            background-color: rgb(59, 131, 59);
        }
        form button:active{
            background-color: rgb(29, 63, 29);
        }
        @media(max-width:435px){
            form{
                width: 80%;
            }
        }
    </style>
</head>
<body>
        <h1>Na kontaktoni</h1>
        <!-- modify this form HTML and place wherever you want your form -->
            <form
            action="https://formspree.io/f/xldbzqkn"method="POST">
                <input type="text" name="name" id="Name" placeholder="Emri" autocomplete="off" required>
                <input type="text" name="Surname" id="Surname" placeholder="Mbiemri" autocomplete="off" required>
                <input type="tel" name="Tel" id="Tel" placeholder="Nr.Telefonit" autocomplete="off" required>
                <input type="email" name="email" id="Email" placeholder="Emaili" autocomplete="off" required>
                <input type="text" name="city" id="city" placeholder="Qyteti" autocomplete="off" required>
                <textarea name="message" id="message" placeholder="Këtu mund të bëni porositë tuaja ose të na kontaktoni duke na dërguar një mesazh." required></textarea>
            <!-- your other form fields go here -->
            <button id="sendBTN" type="submit">Send</button>
            </form>
            
</body>
</html>
