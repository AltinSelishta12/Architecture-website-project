<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchForm: Make an Offer</title>
    <link rel="stylesheet" href="../css-files/offer.css">
     <!--Icons external links-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--Animations external link-->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div class="offers-form">
        <div id="opinion" class="opinion">
            <div class="opinion-header">
                <h2>Share your Opinion</h2>
                <span id="closeBtn"><i class="ri-close-line"></i></span>
            </div>
            <div class="opinion-input">
                <form id="messageForm" action="https://formspree.io/f/xkgvvddg" method="POST">
                    <textarea name="message" id="Message" placeholder="Share your idea..."></textarea>
                    <button id="sendBtn" type="submit">Send</button>
                </form>
            </div>
        </div>
        <div class="forms-info">
            <div class="forms-info-header">
                <h2>ARCH<span>FORM</span></h2>
            </div>
            <div class="forms-info-body">
                <p>Find the perfect solution for your project. Fill out the form below and receive personalized offers tailored to your needs.</p>
                <a id="openBtn" href="">Share Your opinion <span class="arrow-icon"><i class="ri-arrow-right-down-long-fill"></i></span></a>
            </div>
            <div class="forms-info-footer">
                <ul>
                    <li><a href=""><i class="ri-instagram-line"></i></a></li>
                    <li><a href=""><i class="ri-facebook-box-fill"></i></a></li>
                    <li><a href="../html-files/index.html"><i class="ri-home-4-line"></i></a></li>
                    <li><a href=""><i class="ri-shield-user-line"></i></a></li>
                </ul>
                <ul id="rate-icons">
                    <li><a class="star" href=""><i class="ri-star-fill"></i></a></li>
                    <li><a class="star" href=""><i class="ri-star-fill"></i></a></li>
                    <li><a class="star" href=""><i class="ri-star-fill"></i></a></li>
                    <li><a class="star" href=""><i class="ri-star-fill"></i></a></li>
                    <li><a class="star" href=""><i class="ri-star-fill"></i></a></li>
                </ul>
            </div>
        </div>
        <!--id="Formular" is created to work the validation animation-->
        <div id="Formular" class="formular">
            <div class="formular-header">
                <h2>Request a Proposal</h2>
            </div>
            <form id="form" action="https://formspree.io/f/xldwwrgn" method="POST">
                <input type="text" id="name" name="name" placeholder="FullName..." autocomplete="off">
                <input type="text" id="email" name="email" placeholder="Email..." autocomplete="off">
                <input type="tel" id="phoneNumber" name="number" placeholder="Phone Number..." autocomplete="off">
                <input type="text" id="Project" name="Project" placeholder="Project Title..." autocomplete="off">
                <input type="text" id="Budget" name="Budget" placeholder="Budget (Optional)..." autocomplete="off">
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <script>
         const stars = document.querySelectorAll(".star");

       stars.forEach((star) =>{
        star.addEventListener("click", function(e){
            e.preventDefault();
            star.classList.toggle("active");
        });
       });
       //Here goes the validation function of the form
       //Formular is the for the validation function
       //form is the parent of the inputs
       const Formular = document.getElementById("Formular");
       const form = document.getElementById("form");
       const name = document.getElementById("name")
       const email = document.getElementById("email");
       const phoneNumber = document.getElementById("phoneNumber");
       const Project = document.getElementById("Project");
       const Budget = document.getElementById("Budget")

       form.addEventListener("submit", function(e){
        if(name.value.trim() === "" || email.value.trim() === "" || phoneNumber.value.trim() === "" || Project.value.trim() === "" || Budget.value.trim() === ""){
            e.preventDefault();
            Formular.style.border = "1px solid red";

            setTimeout(() =>{
                Formular.style.border = "1px solid #182929";
            }, 2000);
        } 
        else if(!email.value.includes("@") || !email.value.includes(".")){
            e.preventDefault();
            alert("Please write a valid email");
        }
        else{

        }
       });
       // Here goes the input where users can share ideas, opinions ext.

       const closeBtn = document.getElementById("closeBtn");
       const openBtn = document.getElementById("openBtn");
       const sendBtn = document.getElementById("sendBtn");
       const messageForm = document.getElementById("messageForm");
       const Message = document.getElementById("Message");
       const opinion = document.getElementById("opinion");

       //Open message form function
       openBtn.addEventListener("click", function(e){
         e.preventDefault();
         opinion.classList.add("opinion-open");
       });
       //Close message form function
       closeBtn.addEventListener("click", function(){
        opinion.classList.remove("opinion-open");
       });


       //Validation function is added to message form
       messageForm.addEventListener("submit", function(e){
         if(Message.value.trim() === ""){
            e.preventDefault();
            alert("Please fill the required field");
         }
         else{
            alert("Thank you for the message");
         }
       });
    </script>
</body>
</html>
