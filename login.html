<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchForm: Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&family=Anta&family=Audiowide&family=Bebas+Neue&family=Bungee&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Dancing+Script:wght@400..700&family=Gidugu&family=Great+Vibes&family=Lobster&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&family=Petit+Formal+Script&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rationale&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Rubik+Vinyl&family=Russo+One&family=Train+One&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0px;
            padding: 0px;
            text-decoration: none;
            list-style: none;
        }
        body{
            width: 100%;
            min-height: 100vh;
            background-color: #f1f1f1;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        header{
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1{
            font-family: "Dancing Script", cursive;
            font-weight: weight;
            font-style: normal;
            font-size: 2.5rem;
            color: #000000;
            padding-left: 3%;
        }
        header ul{
            display: flex;
            margin-right: 4%;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background-color: transparent;
            backdrop-filter: blur(35px);
            border-radius: 25px;
        }
        header ul a{
            font-size: 1.5rem;
            color: #000000;
        }
        main{
            
            margin-top: 1%;
            width: 100%;
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loginForm{
            width: 50%;
            margin: auto;
            height: 400px;
            background-color: transparent;
        }
        fieldset{
            width: 100%;
            height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-direction: column;
            background-color: transparent;
            backdrop-filter: blur(3px);
            border: 2px solid black;
            border-radius: 20px;
        }
        legend{
            text-align: center;
            font-family: "Dancing Script", cursive;
            font-weight: weight;
            font-style: normal;
            font-size: 2rem;
            color: #000000;
        }
        input{
            margin-top: 4%;
            height: 30px;
            width: 50%;
            position: relative;
            bottom: 10%;
            background-color: transparent;
            border: 1px solid black;
            outline: none;
            color: black;
            font-family: "poppins", serif;
            font-weight: 300;
            font-size: 1.1rem;
            text-align: left;
        }
        input::placeholder{
            color: rgb(0, 0, 0);
            font-family: "poppins", serif;
            font-weight: 300;
            font-size: 1.1rem;
            padding-left: 2%;
        }
        input:focus{
            color: #000;
            font-family: "poppins", serif;
            font-weight: 300;
            font-size: 1.1rem;
            text-align: left;
        }
        button{
            width: 120px;
            height: 40px;
            background-color: black;
            border: none;
            outline: none;
            backdrop-filter: blur(15px);
            font-family: "poppins", serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }
        button:hover{
            background-color: rgba(0, 0, 0, 0.727);
        }
        button:active{
            background-color: rgba(0, 0, 0, 0.527);
        }
    </style>
</head>
<body>
    <header>
            <h1>ArchForm</h1>
            <ul>
                <li><a href="index.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a title="Ankesa dhe Probleme" href="contact.html"><i class="fa-solid fa-circle-exclamation"></i></a></li>
            </ul>
    </header>
    <!--Inside main element will be created a Login form for the ArchForm Website-->
    <main>
        <div class="loginForm">
            <form action="" method="post">
                <fieldset>
                    <legend>Bëhu pjesë e jona</legend>
                    <input type="text" id="Name" name="Name" placeholder="Emri" autocomplete="off" minlength="7" maxlength="15">
                    <p id="name"></p>
                    <input type="text" id="surname" name="surname" placeholder="Mbiemri" autocomplete="off" minlength="7" maxlength="15">
                    <p id="Surname"></p>
                    <input type="password" id="password" name="password" placeholder="Fjalëkalimi" autocomplete="off" minlength="10" maxlength="20">
                    <p id="Password"></p>
                    <input type="date" id="date" name="date" placeholder="Datëlindja" autocomplete="off">
                    <p id="Date"></p>
                    <button id="Submitbtn" onclick="SubmitBTN()" type="Submit">Submit</button>
                </fieldset>
            </form>
        </div>
    </main>
    <script>
        const Name = document.getElementById('Name'); // this variable contains the input id
        const name = document.getElementById('name');// this variable contains the info message (the input isn't completed)
        const surname = document.getElementById('surname');// this variable contains the input id
        const Surname = document.getElementById('Surname');  //this variable contains the info message (the input isn't completed)
        const password = document.getElementById('password');// this variable contains the input id
        const Password = document.getElementById('Password'); //this variable contains the info message (the input isn't completed)
        const date = document.getElementById('date');// this variable contains the input id
        const Date = document.getElementById('Date');  //this variable contains the info message (the input isn't completed) 
        const Submitbtn = document.getElementById('Submitbtn')// this variable contains the id of the submit button

        function SubmitBTN(){
            if(Name.value === ""){
                Name.style.border = "2px solid red";
            }
            // here starts the condition for the surname input
            if(surname.value === ""){
                surname.style.border = "2px solid red";
                
            }
            // here starts the condition for the surname input
            if(password.value === ""){
                password.style.border = "2px solid red";
            }
            // here starts the condition for the date input
            if(date.value === ""){
                date.style.border = "2px solid red";
            }
        }

    </script>
</body>
</html>
