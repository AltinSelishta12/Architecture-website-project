                <button id="submitbtn" onclick="Submitbtn()">Submit</button>
    </main>
    <script>
        const valid = document.getElementById('valid');
        const submitbtn = document.getElementById('submitbtn');
        const pass = document.getElementById('pass')

            if(question.value === ""){
               valid.textContent = "Ju lutemi, parashtroni kërkesën tuaj.";
