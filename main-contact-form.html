        :root{
            --primary-color: #fff;
            --primary-text-color: #000;
            --primary-font: "Poppins", serif;
            --title-font: "Red Rose", serif;
            --border-color: #c7c7c7;
        }
        *{
            margin: 0px;
            padding: 0px;
            text-decoration: none;
            list-style: none;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .main-form{
            width: 40%;
            height: 80vh;
            background-color: var(--primary-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-direction: column;
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .main-form h2{
            font-family: var(--title-font);
            font-weight: 200;
            font-size: 2rem;
        }
        .main-form form{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            height: 100%;
        }
        .main-form form input{
            width: 60%;
            height: 35px;
            padding-left: 2%;
            font-family: var(--primary-font);
        }
        .main-form form select{
            width: 60%;
            height: 35px;
            font-family: var(--primary-font);
            padding-left: 2%;
        }
        .main-form form button{
            width: 60%;
            height: 35px;
            font-family: var(--primary-font);
            font-weight: 200;
            color: var(--primary-text-color);
            background-color: var(--primary-color);
            border: 1px solid rgb(150, 150, 150);
        }
        .main-form form button:hover{
            background-color: rgba(172, 171, 171, 0.178);
        }
        .main-form form button:active{
            background-color: rgba(172, 171, 171, 0.377);
        }
        .terms-conditions{
            display: flex;
            flex-direction: none;
            width: 60%;
        }
        #checkbox{
            width: 10%;
            height: 20px;
        }
        .terms-conditions a{
            font-family: var(--primary-font);
            color: blue;
            text-decoration: underline;
            font-size: 0.9rem;
        }
        @media(max-width:480px){
            .main-form{
                width: 100%;
            }
            .main-form form{
                width: 100%;
                height: 100%;
                border: 2px solid #c7c7c7;
            }
            .main-form form input{
                width: 60%;
            }
        }
        @media(min-width:481px) and (max-width:820px){
            .main-form{
                width: 100%;
            }
            .main-form form{
                width: 100%;
                height: 100%;
                border: 2px solid #c7c7c7;
            }
            .main-form form input{
                width: 60%;
            }
        }

<body>
    <div id="mainForm" class="main-form">
        <h2>CONTACT US</h2>
        <form id="form" action="https://formspree.io/f/xqalerdr" method="POST">
            <input type="text" id="name" name="name" placeholder="Name/Surname" autocomplete="off">
            <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Phone Number" autocomplete="off">
            <input type="text" id="address" name="address" placeholder="City/Address" autocomplete="off">
            <select name="living type" id="LivingType">
                <option value="Living type" disabled selected>Living type</option>
                <option value="FAMILY HOMES">FAMILY HOMES</option>
                <option value="MOUTAIN CABINS">MOUTAIN CABINS</option>
                <option value="URBAN APARTMENTS">URBAN APARTMENTS</option>
                <option value="LUXURY VILLAS">LUXURY VILLAS</option>
                <option value="RESIDENTIAL TOWER">RESIDENTIAL TOWER</option>
            </select>
            <input type="text" id="budget" name="budget" placeholder="Budget (Type 0 if you don't need the budget)" autocomplete="off">
            <input type="email" id="email" name="email" placeholder="Email" autocomplete="off">
            <div class="terms-conditions">
                <input type="checkbox" id="checkbox" name="checkbox">
                <a href="terms-conditions.html">I accept the Terms and Conditions.</a>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
    <script>
        const form = document.getElementById("form");
        const name = document.getElementById("name");
        const phoneNumber = document.getElementById("phoneNumber");
        const address = document.getElementById("address");
        const email = document.getElementById("email");
        const checkbox = document.getElementById("checkbox")
        const mainForm = document.getElementById("mainForm");

        form.addEventListener("submit", function(event){
            if(name.value.trim() === "" || phoneNumber.value.trim() === "" || address.value.trim() === "" || email.value.trim() === ""){
                event.preventDefault();
                alert("Please fill the required fields");

            }
        })
        form.addEventListener("submit", function(event){
            if(!checkbox.checked){
                event.preventDefault();
                alert("Please accept terms and conditions");
            }
        })
    </script>
</body>
